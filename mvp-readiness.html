<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B2B NativePHP - MVP Readiness Analysis</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #242834;
    --border: #2e3344;
    --text: #e1e4ed;
    --text-muted: #8b90a0;
    --accent: #60a5fa;
    --green: #34d399;
    --green-dim: #065f46;
    --yellow: #fbbf24;
    --yellow-dim: #78350f;
    --red: #f87171;
    --red-dim: #7f1d1d;
    --orange: #fb923c;
    --orange-dim: #7c2d12;
    --purple: #a78bfa;
    --brand-green: #2d6a4f;
    --brand-brown: #8b6914;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
  }

  .layout {
    display: grid;
    grid-template-columns: 320px 1fr;
    grid-template-rows: 1fr auto;
    height: 100vh;
  }

  /* Sidebar */
  .sidebar {
    grid-row: 1 / 3;
    background: var(--surface);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 16px;
  }

  .sidebar h1 {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 4px;
    color: var(--text);
  }

  .sidebar .subtitle {
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 16px;
    line-height: 1.4;
  }

  .section-title {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    margin: 16px 0 8px;
  }

  /* Score Ring */
  .score-ring-container {
    display: flex;
    align-items: center;
    gap: 16px;
    background: var(--surface2);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 12px;
  }

  .score-ring {
    position: relative;
    width: 80px;
    height: 80px;
    flex-shrink: 0;
  }

  .score-ring svg { transform: rotate(-90deg); }

  .score-ring .score-label {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .score-ring .score-value {
    font-size: 22px;
    font-weight: 800;
    line-height: 1;
  }

  .score-ring .score-unit {
    font-size: 10px;
    color: var(--text-muted);
    font-weight: 600;
  }

  .score-detail { flex: 1; }

  .score-detail .score-status {
    font-size: 13px;
    font-weight: 700;
    margin-bottom: 4px;
  }

  .score-detail .score-desc {
    font-size: 11px;
    color: var(--text-muted);
    line-height: 1.4;
  }

  /* Presets */
  .presets {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 12px;
  }

  .preset-btn {
    font-size: 11px;
    padding: 5px 10px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.15s;
    font-weight: 600;
  }

  .preset-btn:hover { border-color: var(--accent); color: var(--accent); }
  .preset-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* Feature List */
  .feature-group {
    margin-bottom: 12px;
  }

  .feature-group-header {
    font-size: 12px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .feature-group-header .count {
    font-size: 10px;
    background: var(--surface2);
    padding: 1px 6px;
    border-radius: 10px;
    color: var(--text-muted);
    font-weight: 600;
  }

  .feature-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 8px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.12s;
    font-size: 12px;
  }

  .feature-item:hover { background: var(--surface2); }
  .feature-item.selected { background: var(--accent); background: rgba(96, 165, 250, 0.15); }

  .feature-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .feature-dot.done { background: var(--green); }
  .feature-dot.partial { background: var(--yellow); }
  .feature-dot.missing { background: var(--red); }
  .feature-dot.critical { background: var(--red); box-shadow: 0 0 6px var(--red); }
  .feature-dot.cut { background: var(--text-muted); opacity: 0.4; }

  .feature-item.is-cut { opacity: 0.45; text-decoration: line-through; }

  .feature-name { flex: 1; }

  .priority-badge {
    font-size: 9px;
    font-weight: 700;
    padding: 1px 5px;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .priority-badge.p0 { background: var(--red-dim); color: var(--red); }
  .priority-badge.p1 { background: var(--orange-dim); color: var(--orange); }
  .priority-badge.p2 { background: var(--yellow-dim); color: var(--yellow); }
  .priority-badge.p3 { background: rgba(96, 165, 250, 0.15); color: var(--accent); }

  /* Priority controls */
  .priority-select {
    font-size: 10px;
    background: var(--surface2);
    color: var(--text-muted);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1px 4px;
    cursor: pointer;
    font-weight: 600;
  }

  /* Main Canvas */
  .main-area {
    overflow: auto;
    padding: 24px;
    position: relative;
  }

  .view-tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 20px;
  }

  .view-tab {
    font-size: 12px;
    padding: 7px 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    font-weight: 600;
    transition: all 0.15s;
  }

  .view-tab:hover { border-color: var(--accent); color: var(--text); }
  .view-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* Feature Map View */
  .feature-map {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
  }

  .module-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    transition: all 0.2s;
  }

  .module-card:hover { border-color: rgba(96, 165, 250, 0.3); }

  .module-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .module-title {
    font-size: 14px;
    font-weight: 700;
  }

  .module-progress {
    font-size: 11px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 6px;
  }

  .module-bar {
    height: 4px;
    background: var(--surface2);
    border-radius: 2px;
    margin-bottom: 12px;
    overflow: hidden;
  }

  .module-bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  .module-features {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .module-feature {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--text-muted);
    padding: 3px 0;
  }

  .module-feature .check {
    font-size: 12px;
    width: 16px;
    text-align: center;
    flex-shrink: 0;
  }

  .module-feature.done .check { color: var(--green); }
  .module-feature.partial .check { color: var(--yellow); }
  .module-feature.missing .check { color: var(--red); }
  .module-feature.cut .check { color: var(--text-muted); opacity: 0.4; }
  .module-feature.done { color: var(--text); }
  .module-feature.cut { opacity: 0.45; text-decoration: line-through; }

  /* Priority Matrix View */
  .priority-matrix {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: auto auto;
    gap: 16px;
  }

  .matrix-quadrant {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    min-height: 180px;
  }

  .matrix-quadrant-title {
    font-size: 12px;
    font-weight: 700;
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .matrix-quadrant-desc {
    font-size: 10px;
    color: var(--text-muted);
    margin-bottom: 12px;
  }

  .matrix-item {
    font-size: 11px;
    padding: 6px 8px;
    background: var(--surface2);
    border-radius: 6px;
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    transition: background 0.12s;
  }

  .matrix-item:hover { background: rgba(96, 165, 250, 0.1); }

  .matrix-item .effort-tag {
    font-size: 9px;
    font-weight: 700;
    padding: 1px 4px;
    border-radius: 3px;
    margin-left: auto;
    flex-shrink: 0;
  }

  .effort-tag.small { background: rgba(52, 211, 153, 0.15); color: var(--green); }
  .effort-tag.medium { background: rgba(251, 191, 36, 0.15); color: var(--yellow); }
  .effort-tag.large { background: rgba(248, 113, 113, 0.15); color: var(--red); }

  /* Tech Stack View */
  .stack-view {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .stack-layer {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
  }

  .stack-layer-title {
    font-size: 13px;
    font-weight: 700;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .stack-layer-title .layer-dot {
    width: 10px;
    height: 10px;
    border-radius: 3px;
  }

  .stack-nodes {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .stack-node {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 11px;
    display: flex;
    flex-direction: column;
    gap: 2px;
    min-width: 140px;
    transition: border-color 0.15s;
  }

  .stack-node:hover { border-color: var(--accent); }

  .stack-node .node-name { font-weight: 700; }
  .stack-node .node-path { font-size: 10px; color: var(--text-muted); font-family: 'SF Mono', 'Fira Code', monospace; }

  /* Prompt area */
  .prompt-area {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 12px 20px;
    max-height: 260px;
    overflow-y: auto;
  }

  .prompt-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }

  .prompt-header span {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
  }

  .copy-btn {
    font-size: 11px;
    padding: 4px 12px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text-muted);
    cursor: pointer;
    font-weight: 600;
    transition: all 0.15s;
  }

  .copy-btn:hover { border-color: var(--accent); color: var(--accent); }
  .copy-btn.copied { background: var(--green); color: #fff; border-color: var(--green); }

  .prompt-text {
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 11px;
    line-height: 1.6;
    color: var(--text-muted);
    white-space: pre-wrap;
    word-break: break-word;
  }

  /* Legend */
  .legend {
    display: flex;
    gap: 12px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 10px;
    color: var(--text-muted);
    font-weight: 600;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

  /* Separator */
  .sep {
    height: 1px;
    background: var(--border);
    margin: 12px 0;
  }

  /* Stat pills */
  .stat-row {
    display: flex;
    gap: 6px;
    margin-bottom: 12px;
  }

  .stat-pill {
    flex: 1;
    background: var(--surface2);
    border-radius: 8px;
    padding: 8px;
    text-align: center;
  }

  .stat-pill .stat-num {
    font-size: 18px;
    font-weight: 800;
    line-height: 1;
  }

  .stat-pill .stat-label {
    font-size: 9px;
    color: var(--text-muted);
    font-weight: 600;
    text-transform: uppercase;
    margin-top: 2px;
  }
</style>
</head>
<body>

<div class="layout">
  <!-- Sidebar -->
  <div class="sidebar">
    <h1>IKONO VERDE MVP</h1>
    <div class="subtitle">B2B Wholesale App &middot; Laravel 12 + React 19 + NativePHP<br>Mexico Market &middot; 5 products, 2-3 categories</div>

    <!-- Score Ring -->
    <div class="score-ring-container">
      <div class="score-ring">
        <svg width="80" height="80" viewBox="0 0 80 80">
          <circle cx="40" cy="40" r="34" fill="none" stroke="var(--surface2)" stroke-width="6"/>
          <circle id="scoreArc" cx="40" cy="40" r="34" fill="none" stroke="var(--green)" stroke-width="6" stroke-linecap="round" stroke-dasharray="213.6" stroke-dashoffset="213.6"/>
        </svg>
        <div class="score-label">
          <span class="score-value" id="scoreValue">0%</span>
          <span class="score-unit">READY</span>
        </div>
      </div>
      <div class="score-detail">
        <div class="score-status" id="scoreStatus">Calculating...</div>
        <div class="score-desc" id="scoreDesc"></div>
      </div>
    </div>

    <div class="stat-row">
      <div class="stat-pill"><span class="stat-num" id="doneCount" style="color:var(--green)">0</span><div class="stat-label">Done</div></div>
      <div class="stat-pill"><span class="stat-num" id="partialCount" style="color:var(--yellow)">0</span><div class="stat-label">Partial</div></div>
      <div class="stat-pill"><span class="stat-num" id="missingCount" style="color:var(--red)">0</span><div class="stat-label">Missing</div></div>
      <div class="stat-pill"><span class="stat-num" id="cutCount" style="color:var(--text-muted)">0</span><div class="stat-label">Cut</div></div>
    </div>

    <!-- Presets -->
    <div class="section-title">Presets</div>
    <div class="presets" id="presets"></div>

    <div class="sep"></div>

    <!-- Feature List -->
    <div class="section-title">Feature Inventory</div>
    <div class="legend">
      <div class="legend-item"><div class="feature-dot done"></div> Done</div>
      <div class="legend-item"><div class="feature-dot partial"></div> Partial</div>
      <div class="legend-item"><div class="feature-dot missing"></div> Missing</div>
      <div class="legend-item"><div class="feature-dot cut"></div> Cut</div>
    </div>
    <div id="featureList"></div>
  </div>

  <!-- Main View -->
  <div class="main-area">
    <div class="view-tabs" id="viewTabs"></div>
    <div id="viewContent"></div>
  </div>

  <!-- Prompt Output -->
  <div class="prompt-area">
    <div class="prompt-header">
      <span>Generated prompt</span>
      <button class="copy-btn" id="copyBtn" onclick="copyPrompt()">Copy</button>
    </div>
    <div class="prompt-text" id="promptOutput"></div>
  </div>
</div>

<script>
// ==================== DATA ====================

const modules = [
  {
    id: 'auth',
    name: 'Authentication',
    icon: 'lock',
    features: [
      { id: 'login', name: 'Login', status: 'done', note: 'Auth::attempt delegates to ApiUserProvider which calls API /login and stores token', files: ['app/Http/Controllers/Auth/LoginController.php', 'app/Auth/ApiUserProvider.php', 'resources/js/pages/auth/login.tsx'] },
      { id: 'register', name: 'Registration', status: 'done', note: 'Full flow with RFC, phone, terms', files: ['app/Http/Controllers/Auth/RegisterController.php', 'resources/js/pages/auth/register.tsx'] },
      { id: 'logout', name: 'Logout', status: 'done', note: 'POST /logout with session destroy', files: ['app/Http/Controllers/Auth/LogoutController.php'] },
      { id: 'forgot-password', name: 'Forgot Password', status: 'done', note: 'Email form posts to API /forgot-password, success/error states, linked from login', files: ['app/Http/Controllers/Auth/ForgotPasswordController.php', 'app/Http/Requests/Auth/ForgotPasswordRequest.php', 'resources/js/pages/auth/forgot-password.tsx', 'app/Services/ApiClient.php'] },
      { id: 'email-verify', name: 'Email Verification', status: 'missing', priority: 'p2', effort: 'medium', note: 'MustVerifyEmail is commented out on User model' },
      { id: 'session-mgmt', name: 'Session/Token Sync', status: 'done', note: 'Both login (via ApiUserProvider) and register store api_token in session', files: ['app/Auth/ApiUserProvider.php', 'app/Http/Controllers/Auth/RegisterController.php'] },
    ]
  },
  {
    id: 'catalog',
    name: 'Product Catalog',
    icon: 'grid',
    features: [
      { id: 'browse', name: 'Browse Products', status: 'done', note: 'Grid layout with product cards', files: ['resources/js/pages/catalog.tsx', 'app/Http/Controllers/CatalogController.php'] },
      { id: 'search-client', name: 'Client-side Search', status: 'done', note: 'Filters by name, category, SKU', files: ['resources/js/pages/catalog.tsx'] },
      { id: 'product-detail', name: 'Product Detail', status: 'done', note: 'Image, description, volume pricing tiers', files: ['resources/js/pages/product/show.tsx', 'app/Http/Controllers/ProductController.php'] },
      { id: 'volume-pricing', name: 'Volume Pricing', status: 'done', note: 'Interactive tier display with quantity selector', files: ['resources/js/pages/product/show.tsx'] },
      { id: 'category-filter', name: 'Category Filtering', status: 'cut', priority: 'na', effort: 'medium', note: 'Not needed - only 5 products across 2-3 categories' },
      { id: 'pagination', name: 'Product Pagination', status: 'cut', priority: 'na', effort: 'small', note: 'Not needed - only 5 products fit on one screen' },
      { id: 'server-search', name: 'Server-side Search', status: 'cut', priority: 'na', effort: 'medium', note: 'Not needed - client-side search over 5 items is fine' },
    ]
  },
  {
    id: 'cart',
    name: 'Shopping Cart',
    icon: 'cart',
    features: [
      { id: 'add-item', name: 'Add to Cart', status: 'done', note: 'From product detail with quantity', files: ['resources/js/pages/product/show.tsx'] },
      { id: 'update-qty', name: 'Update Quantity', status: 'done', note: 'Inline quantity controls', files: ['resources/js/components/cart/CartItemCard.tsx'] },
      { id: 'remove-item', name: 'Remove Item', status: 'done', note: 'Swipe or button delete', files: ['app/Http/Controllers/CartController.php'] },
      { id: 'clear-cart', name: 'Clear Cart', status: 'done', note: 'With confirmation dialog', files: ['resources/js/pages/cart.tsx'] },
      { id: 'order-summary', name: 'Order Summary', status: 'done', note: 'Subtotal, shipping, total', files: ['resources/js/pages/cart.tsx'] },
      { id: 'cart-badge', name: 'Cart Badge', status: 'done', note: 'Native bottom nav badge count', files: ['resources/js/layouts/AppLayout.tsx'] },
    ]
  },
  {
    id: 'checkout',
    name: 'Checkout Flow',
    icon: 'creditcard',
    features: [
      { id: 'shipping-form', name: 'Shipping Address Form', status: 'done', note: '3-step wizard with validation', files: ['resources/js/pages/checkout.tsx'] },
      { id: 'stripe-payment', name: 'Stripe Payment', status: 'done', note: 'Hosted Checkout Sessions with polling', files: ['app/Http/Controllers/CheckoutController.php', 'app/Services/CheckoutService.php'] },
      { id: 'success-confirm', name: 'Success Confirmation', status: 'done', note: 'Animated success step with link to orders', files: ['resources/js/pages/checkout.tsx'] },
      { id: 'saved-addresses', name: 'Saved Addresses', status: 'partial', priority: 'p1', effort: 'large', note: 'Frontend CRUD built, awaiting API endpoints (API-6)', files: ['app/Http/Controllers/AddressController.php', 'app/Services/AddressService.php', 'resources/js/pages/account/addresses.tsx'] },
      { id: 'order-notes', name: 'Order Notes', status: 'missing', priority: 'p3', effort: 'small', note: 'No field for delivery instructions' },
    ]
  },
  {
    id: 'orders',
    name: 'Order Management',
    icon: 'package',
    features: [
      { id: 'order-list', name: 'Orders List', status: 'done', note: 'Infinite scroll with status badges', files: ['resources/js/pages/orders/index.tsx', 'app/Http/Controllers/OrderController.php'] },
      { id: 'order-expand', name: 'Expandable Details', status: 'done', note: 'Items, shipping address, totals', files: ['resources/js/pages/orders/index.tsx'] },
      { id: 'order-detail', name: 'Order Detail Page', status: 'missing', priority: 'p2', effort: 'medium', note: 'Only expandable cards, no dedicated page' },
      { id: 'reorder', name: 'Reorder', status: 'missing', priority: 'p2', effort: 'medium', note: 'Deprioritized - small catalog makes re-adding from browse fast enough' },
      { id: 'order-tracking', name: 'Order Tracking', status: 'missing', priority: 'p2', effort: 'large', note: 'No shipping status updates or tracking' },
    ]
  },
  {
    id: 'account',
    name: 'Account & Profile',
    icon: 'user',
    features: [
      { id: 'profile-display', name: 'Profile Display', status: 'done', note: 'Name, RFC, email, initials avatar, stats', files: ['resources/js/pages/account.tsx'] },
      { id: 'profile-edit', name: 'Profile Editing', status: 'missing', priority: 'p1', effort: 'medium', note: 'No way to edit name, phone, email' },
      { id: 'billing-info', name: 'Billing Information', status: 'missing', priority: 'p1', effort: 'large', note: 'Menu item is a stub (href="#")' },

    features: [
      { id: 'tests', name: 'Feature/Unit Tests', status: 'missing', priority: 'p1', effort: 'large', note: 'Only 2 example tests exist' },
      { id: 'error-handling', name: 'Error Handling', status: 'missing', priority: 'p0', effort: 'medium', note: 'No global error boundaries or API error states' },
      { id: 'notifications', name: 'Email Notifications', status: 'missing', priority: 'p2', effort: 'medium', note: 'No order confirmation or status update emails' },
    ]

const presets = [
  { id: 'all', name: 'All Features', filter: () => true },
  { id: 'active', name: 'In Scope', filter: f => f.status !== 'cut' },
  { id: 'blockers', name: 'Launch Blockers', filter: f => f.priority === 'p0' },
  { id: 'missing', name: 'Missing Only', filter: f => f.status === 'missing' },
  { id: 'partial', name: 'Needs Work', filter: f => f.status === 'partial' || f.status === 'missing' },
  { id: 'done', name: 'Completed', filter: f => f.status === 'done' },
  { id: 'cut', name: 'Cut from Scope', filter: f => f.status === 'cut' },
];

const views = [
  { id: 'map', name: 'Feature Map' },
  { id: 'matrix', name: 'Priority Matrix' },
  { id: 'stack', name: 'Architecture' },
];

// ==================== STATE ====================

const state = {
  activePreset: 'all',
  activeView: 'map',
  selectedFeature: null,
};

// ==================== RENDER ====================

function getAllFeatures() {
  const all = [];
  modules.forEach(m => m.features.forEach(f => all.push({ ...f, module: m.name, moduleId: m.id })));
  return all;
}

function getFilteredFeatures() {
  const preset = presets.find(p => p.id === state.activePreset);
  return getAllFeatures().filter(preset.filter);
}

function getActiveFeatures() {
  return getAllFeatures().filter(f => f.status !== 'cut');
}

function computeScore() {
  const active = getActiveFeatures();
  const weights = { done: 1, partial: 0.5, missing: 0 };
  const total = active.length;
  const score = active.reduce((sum, f) => sum + (weights[f.status] || 0), 0);
  return Math.round((score / total) * 100);
}

function renderScoreRing() {
  const pct = computeScore();
  const circumference = 2 * Math.PI * 34;
  const offset = circumference - (pct / 100) * circumference;
  const arc = document.getElementById('scoreArc');
  arc.style.strokeDashoffset = offset;

  let color, status, desc;
  if (pct >= 80) { color = 'var(--green)'; status = 'Nearly Ready'; desc = 'Core features complete. Focus on polish and blockers.'; }
  else if (pct >= 60) { color = 'var(--yellow)'; status = 'In Progress'; desc = 'Solid foundation but key gaps remain for launch.'; }
  else if (pct >= 40) { color = 'var(--orange)'; status = 'Early Stage'; desc = 'Core flows work but many features still needed.'; }
  else { color = 'var(--red)'; status = 'Not Ready'; desc = 'Significant work needed across most modules.'; }

  arc.style.stroke = color;
  document.getElementById('scoreValue').textContent = pct + '%';
  document.getElementById('scoreValue').style.color = color;
  document.getElementById('scoreStatus').textContent = status;
  document.getElementById('scoreStatus').style.color = color;
  document.getElementById('scoreDesc').textContent = desc;

  const all = getAllFeatures();
  document.getElementById('doneCount').textContent = all.filter(f => f.status === 'done').length;
  document.getElementById('partialCount').textContent = all.filter(f => f.status === 'partial').length;
  document.getElementById('missingCount').textContent = all.filter(f => f.status === 'missing').length;
  document.getElementById('cutCount').textContent = all.filter(f => f.status === 'cut').length;
}

function renderPresets() {
  const container = document.getElementById('presets');
  container.innerHTML = presets.map(p =>
    `<button class="preset-btn ${state.activePreset === p.id ? 'active' : ''}" onclick="setPreset('${p.id}')">${p.name}</button>`
  ).join('');
}

function renderFeatureList() {
  const container = document.getElementById('featureList');
  const filtered = getFilteredFeatures();
  const grouped = {};

  filtered.forEach(f => {
    if (!grouped[f.module]) grouped[f.module] = [];
    grouped[f.module].push(f);
  });

  let html = '';
  for (const [moduleName, features] of Object.entries(grouped)) {
    html += `<div class="feature-group">
      <div class="feature-group-header">${moduleName} <span class="count">${features.length}</span></div>`;

    features.forEach(f => {
      const priorityHtml = f.priority && f.priority !== 'na' ? `<span class="priority-badge ${f.priority}">${f.priority}</span>` : '';
      const cutClass = f.status === 'cut' ? ' is-cut' : '';
      html += `<div class="feature-item${cutClass} ${state.selectedFeature === f.id ? 'selected' : ''}" onclick="selectFeature('${f.id}')" title="${f.note || ''}">
        <div class="feature-dot ${f.status}"></div>
        <span class="feature-name">${f.name}</span>
        ${f.status === 'cut' ? '<span style="font-size:9px;color:var(--text-muted);font-weight:600">CUT</span>' : priorityHtml}
      </div>`;
    });

    html += `</div>`;
  }

  container.innerHTML = html;
}

function renderViewTabs() {
  const container = document.getElementById('viewTabs');
  container.innerHTML = views.map(v =>
    `<button class="view-tab ${state.activeView === v.id ? 'active' : ''}" onclick="setView('${v.id}')">${v.name}</button>`
  ).join('');
}

function renderView() {
  const container = document.getElementById('viewContent');

  if (state.activeView === 'map') renderFeatureMap(container);
  else if (state.activeView === 'matrix') renderPriorityMatrix(container);
  else if (state.activeView === 'stack') renderStackView(container);
}

function renderFeatureMap(container) {
  let html = '<div class="feature-map">';

  modules.forEach(m => {
    const active = m.features.filter(f => f.status !== 'cut');
    const done = active.filter(f => f.status === 'done').length;
    const partial = active.filter(f => f.status === 'partial').length;
    const total = active.length;
    const pct = total > 0 ? Math.round(((done + partial * 0.5) / total) * 100) : 100;

    let barColor;
    if (pct >= 80) barColor = 'var(--green)';
    else if (pct >= 50) barColor = 'var(--yellow)';
    else if (pct > 0) barColor = 'var(--orange)';
    else barColor = 'var(--red)';

    let progressBg, progressText;
    if (pct === 100) { progressBg = 'rgba(52, 211, 153, 0.15)'; progressText = 'var(--green)'; }
    else if (pct >= 50) { progressBg = 'rgba(251, 191, 36, 0.15)'; progressText = 'var(--yellow)'; }
    else { progressBg = 'rgba(248, 113, 113, 0.15)'; progressText = 'var(--red)'; }

    html += `<div class="module-card">
      <div class="module-header">
        <span class="module-title">${m.name}</span>
        <span class="module-progress" style="background:${progressBg};color:${progressText}">${pct}%</span>
      </div>
      <div class="module-bar"><div class="module-bar-fill" style="width:${pct}%;background:${barColor}"></div></div>
      <div class="module-features">`;

    m.features.forEach(f => {
      const icon = f.status === 'done' ? '\u2713' : f.status === 'partial' ? '\u25CB' : f.status === 'cut' ? '\u2014' : '\u2717';
      const effortHtml = f.effort && f.status !== 'cut' ? `<span class="effort-tag ${f.effort}" style="margin-left:auto;font-size:9px;padding:1px 4px;border-radius:3px">${f.effort}</span>` : '';
      html += `<div class="module-feature ${f.status}" title="${f.note || ''}">
        <span class="check">${icon}</span>
        <span style="flex:1">${f.name}</span>
        ${f.status === 'cut' ? '<span style="margin-left:auto;font-size:9px;color:var(--text-muted);opacity:0.6">cut</span>' : effortHtml}
      </div>`;
    });

    html += `</div></div>`;
  });

  html += '</div>';
  container.innerHTML = html;
}

function renderPriorityMatrix(container) {
  const missing = getAllFeatures().filter(f => f.status !== 'done' && f.status !== 'cut');

  const quadrants = [
    {
      title: 'P0 - Launch Blockers',
      titleColor: 'var(--red)',
      desc: 'Must fix before any launch. Users cannot work around these.',
      items: missing.filter(f => f.priority === 'p0')
    },
    {
      title: 'P1 - Core MVP Gaps',
      titleColor: 'var(--orange)',
      desc: 'Expected by B2B customers. Launch is weak without these.',
      items: missing.filter(f => f.priority === 'p1')
    },
    {
      title: 'P2 - Nice to Have',
      titleColor: 'var(--yellow)',
      desc: 'Improve UX but not blocking. Can ship v1 without these.',
      items: missing.filter(f => f.priority === 'p2')
    },
    {
      title: 'P3 - Future Enhancements',
      titleColor: 'var(--accent)',
      desc: 'Post-launch roadmap items. Low urgency for MVP.',
      items: missing.filter(f => f.priority === 'p3')
    },
  ];

  let html = '<div class="priority-matrix">';

  quadrants.forEach(q => {
    html += `<div class="matrix-quadrant">
      <div class="matrix-quadrant-title"><span style="color:${q.titleColor}">${q.title}</span> <span class="count" style="font-size:10px;background:var(--surface2);padding:1px 6px;border-radius:10px;color:var(--text-muted);font-weight:600">${q.items.length}</span></div>
      <div class="matrix-quadrant-desc">${q.desc}</div>`;

    q.items.forEach(f => {
      const effortHtml = f.effort ? `<span class="effort-tag ${f.effort}">${f.effort}</span>` : '';
      html += `<div class="matrix-item" title="${f.note || ''}">
        <div class="feature-dot ${f.status === 'partial' ? 'partial' : 'missing'}"></div>
        <span style="flex:1">${f.name}</span>
        <span style="font-size:9px;color:var(--text-muted)">${f.module}</span>
        ${effortHtml}
      </div>`;
    });

    html += `</div>`;
  });

  html += '</div>';
  container.innerHTML = html;
}

        { name: 'Welcome', path: 'resources/js/pages/welcome.tsx', desc: 'Public landing page' },

      </div>

    layer.nodes.forEach(n => {

function updatePrompt() {
  const active = getActiveFeatures();
  const all = getAllFeatures();
  const score = computeScore();
  const cutFeatures = all.filter(f => f.status === 'cut');
  const p0 = active.filter(f => f.priority === 'p0');
  const p1 = active.filter(f => f.priority === 'p1');
  const done = active.filter(f => f.status === 'done');
  const partial = active.filter(f => f.status === 'partial');
  const missing = active.filter(f => f.status === 'missing');

  let prompt = `MVP Readiness Report for IKONO VERDE B2B App
${'='.repeat(48)}

Overall Score: ${score}% complete (${done.length} done, ${partial.length} partial, ${missing.length} missing out of ${active.length} in-scope features)
Scope: 5 products, 2-3 categories (${cutFeatures.length} features cut from scope)

Tech Stack: Laravel 12 + Inertia v2 + React 19 + NativePHP (Android)
Architecture: Thin client (all data from external API via ApiClient service)
Market: Mexico (Spanish UI, MXN currency, RFC tax ID)

CUT FROM SCOPE (not needed for 5-product launch):
${cutFeatures.map(f => `  - ${f.name}: ${f.note}`).join('\n')}

LAUNCH BLOCKERS (P0 - fix before any release):
${p0.map(f => `  - ${f.name} (${f.module}): ${f.note}${f.effort ? ' [effort: ' + f.effort + ']' : ''}`).join('\n')}

CORE MVP GAPS (P1 - critical for B2B customers):
${p1.map(f => `  - ${f.name} (${f.module}): ${f.note}${f.effort ? ' [effort: ' + f.effort + ']' : ''}`).join('\n')}

COMPLETED MODULES:
${modules.filter(m => m.features.filter(f => f.status !== 'cut').every(f => f.status === 'done')).map(m => {
  const a = m.features.filter(f => f.status !== 'cut');
  return `  - ${m.name} (${a.length}/${a.length} features)`;
}).join('\n') || '  (none fully complete)'}

PARTIALLY COMPLETE:
${modules.filter(m => {
  const a = m.features.filter(f => f.status !== 'cut');
  return a.some(f => f.status === 'done') && a.some(f => f.status !== 'done');
}).map(m => {
  const a = m.features.filter(f => f.status !== 'cut');
  const d = a.filter(f => f.status === 'done').length;
  return `  - ${m.name} (${d}/${a.length} features)`;
}).join('\n')}

RECOMMENDED NEXT STEPS (ordered by priority and effort):
1. Add error handling/boundaries (P0, medium) - app crashes on API failures
2. Create Terms & Privacy pages (P0, small) - linked but missing
3. Add offline/error state handling (P1, medium) - mobile app needs this
4. Add profile editing (P1, medium) - users can't update their info
5. Complete saved addresses (P1, large) - frontend built, awaiting API endpoints (API-6)
6. Add billing info management (P1, large) - B2B customers need invoicing
7. Write feature tests (P1, large) - only 2 example tests exist`;

  document.getElementById('promptOutput').textContent = prompt;
}

// ==================== ACTIONS ====================

function setPreset(id) {
  state.activePreset = id;
  updateAll();
}

function setView(id) {
  state.activeView = id;
  updateAll();
}

function selectFeature(id) {
  state.selectedFeature = state.selectedFeature === id ? null : id;
  renderFeatureList();
}

function copyPrompt() {
  const text = document.getElementById('promptOutput').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = 'Copy';
      btn.classList.remove('copied');
    }, 1500);
  });
}

function updateAll() {
  renderScoreRing();
  renderPresets();
  renderFeatureList();
  renderViewTabs();
  renderView();
  updatePrompt();
}

// ==================== INIT ====================
updateAll();
</script>
